<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Song 💗</title>

<link rel="stylesheet" href="page2.css">

</head>

<body>

<!-- Падающие сердечки и сакура -->

<div class="particles"></div>

<!-- Веточки -->

<img src="cherry_branch.png" class="branch left">

<img src="cherry_branch.png" class="branch right">

<div class="container">

<h1 class="title">

♡ Our song ♡

</h1>

<p class="subtitle">

Lana Del Rey — Ultraviolence

</p>

<!-- Проигрыватель -->

<div class="player">

<!-- Обложка -->

<div class="cover">

<img src="cover.png" alt="Album Cover">

</div>

<!-- Винил -->

<div class="vinyl-container">

<div class="glow"></div>

<img src="vinyl.PNG" id="vinyl">

<!-- Игла -->

<div id="needle">

<div class="needle-head"></div>

<div class="needle-arm"></div>

</div>

</div>

</div>

<!-- Кнопки -->

<div class="controls">

<button id="prevBtn">

⏮

</button>

<button id="playBtn">

▶️

</button>

<button id="nextBtn">

⏭

</button>

</div>

<p class="playing">

♪ Now Playing

</p>

<!-- Музыка -->

<audio id="music">

<source src="music.mp3" type="audio/mpeg">

</audio>

<!-- Листай -->

<div class="scroll">

↓

<br>

Листай дальше

</div>

<!-- Фотографии -->

<div class="gallery">

<div class="photo-card hidden">

<img src="photo1.jpg">

<p>

♡ самая лучшая фотография начинается именно отсюда ♡

</p>

</div>

<div class="photo-card hidden">

<img src="photo2.jpg">

<p>

помнишь этот день? 🌸

</p>

</div>
<div class="photo-card hidden">

<img src="photo3.jpg">

<p>

хочу чтобы таких моментов было ещё очень много 🤍

</p>

</div>



<div class="photo-card hidden">

<img src="photo4.jpg">

<p>

люблю тебя, глупышка 🌸

</p>

</div>

</div>

<!-- Кнопка перехода -->

<div class="next-section">

<p>

ты почти досмотрела мой подарок... 💗

</p>

<a href="page3.html">

<button class="next-page">

💌 Дальше

</button>

</a>

</div>

</div>

<script src="page2.js"></script>

</body>

</html>
